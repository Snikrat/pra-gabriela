<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pra gabriela 🤍</title>

    <style>
        :root {
            --ink: #1a1a22;
            --muted: #5d5d72;

            --pink: #ff78b6;
            --pinkSoft: #ffd6ea;

            --noteA: #fff3a8;
            --noteB: #c6ffbf;
            --noteC: #bfe6ff;
            --noteD: #ffc7e7;

            --envBg1: #141424;
            --envBg2: #0f0f18;

            --envText: rgba(255, 255, 255, .86);
            --envTextMuted: rgba(255, 255, 255, .58);
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
            color: var(--ink);

            background:
                radial-gradient(900px 520px at 50% 12%, rgba(255, 120, 182, .22), transparent 60%),
                radial-gradient(820px 520px at 15% 30%, rgba(184, 92, 255, .14), transparent 62%),
                radial-gradient(820px 520px at 85% 35%, rgba(255, 200, 225, .18), transparent 62%),
                linear-gradient(180deg, #f7f4ff 0%, #fff6fb 45%, #f7fbff 100%);
            min-height: 100svh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                repeating-linear-gradient(0deg, rgba(20, 20, 30, .04) 0 2px, transparent 2px 7px),
                radial-gradient(1200px 520px at 30% 0%, rgba(255, 255, 255, .8), transparent 60%);
            opacity: .35;
            mix-blend-mode: multiply;
        }

        /* ================= ENVELOPE ================= */

        .stage {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            z-index: 10;

            background:
                radial-gradient(900px 520px at 50% 18%, rgba(255, 120, 182, .18), transparent 62%),
                radial-gradient(820px 520px at 20% 70%, rgba(184, 92, 255, .12), transparent 65%),
                linear-gradient(180deg, rgba(12, 10, 24, .62), rgba(12, 10, 24, .72));
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .stage::before {
            content: "";
            position: absolute;
            inset: -1px;
            pointer-events: none;
            background:
                radial-gradient(120% 120% at 50% 45%,
                    transparent 58%,
                    rgba(0, 0, 0, .38) 78%,
                    rgba(0, 0, 0, .58) 100%);
            opacity: .75;
        }

        .stage::after {
            content: "";
            position: absolute;
            inset: -30%;
            pointer-events: none;
            background:
                radial-gradient(40% 28% at 50% 52%, rgba(255, 120, 182, .18), transparent 70%),
                radial-gradient(40% 28% at 50% 86%, rgba(255, 120, 182, .12), transparent 72%);
            filter: blur(8px);
            opacity: .7;
        }

        .envWrap {
            width: min(860px, 94vw);
            position: relative;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            z-index: 1;
        }

        .env {
            position: relative;
            height: min(420px, 52vw);
            min-height: 260px;

            background:
                radial-gradient(900px 420px at 50% 15%, rgba(255, 255, 255, .08), transparent 60%),
                linear-gradient(180deg, rgba(255, 255, 255, .06), rgba(255, 255, 255, .02)),
                linear-gradient(180deg, var(--envBg1), var(--envBg2));

            border-radius: 22px;
            border: 1.5px solid rgba(255, 120, 182, .55);
            box-shadow:
                0 0 0 1px rgba(255, 120, 182, .10) inset,
                0 26px 90px rgba(0, 0, 0, .45);
            overflow: hidden;
        }

        .env .neonBorder {
            position: absolute;
            inset: -2px;
            border-radius: 24px;
            pointer-events: none;
            background: linear-gradient(180deg,
                    rgba(255, 120, 182, .85),
                    rgba(255, 120, 182, .25),
                    rgba(184, 92, 255, .22));
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            padding: 2px;
            filter: blur(2px);
            opacity: .95;
        }

        .env .neonHalo {
            position: absolute;
            inset: -10px;
            border-radius: 30px;
            pointer-events: none;
            border: 1px solid rgba(255, 120, 182, .10);
            box-shadow:
                0 0 26px rgba(255, 120, 182, .22),
                0 0 66px rgba(255, 120, 182, .16);
            opacity: .95;
        }

        .env::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to bottom right,
                    transparent 49.82%,
                    rgba(255, 120, 182, .18) 50%,
                    transparent 50.18%),
                linear-gradient(to top right,
                    transparent 49.82%,
                    rgba(255, 120, 182, .18) 50%,
                    transparent 50.18%);
            opacity: .78;
            pointer-events: none;
        }

        .env::after {
            content: "";
            position: absolute;
            left: -18%;
            right: -18%;
            bottom: -40%;
            height: 85%;
            background: radial-gradient(60% 70% at 50% 0%, rgba(255, 120, 182, .30), transparent 70%);
            filter: blur(2px);
            pointer-events: none;
        }

        .flap {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 58%;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .02)),
                linear-gradient(135deg, transparent 49%, rgba(255, 120, 182, .22) 50%, transparent 51%),
                linear-gradient(225deg, transparent 49%, rgba(255, 120, 182, .22) 50%, transparent 51%);
            transform-origin: 50% 0%;
            transition: .85s cubic-bezier(.2, .9, .2, 1);
            z-index: 3;
        }

        .seal {
            position: absolute;
            left: 50%;
            top: 27%;
            transform: translate(-50%, -50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255, 120, 182, .18);
            border: 2px solid rgba(255, 120, 182, .72);
            display: grid;
            place-items: center;
            font-size: 22px;
            box-shadow:
                0 0 0 10px rgba(255, 120, 182, .08),
                0 0 35px rgba(255, 120, 182, .30);
            z-index: 5;
            transition: .6s;
        }

        /* ========= CARTA ========= */
        .paper {
            position: absolute;
            left: 18px;
            right: 18px;
            top: 18px;
            height: 240px;

            background:
                radial-gradient(700px 280px at 50% 0%, rgba(255, 120, 182, .10), transparent 62%),
                repeating-linear-gradient(to bottom,
                    rgba(120, 130, 170, .12) 0px,
                    rgba(120, 130, 170, .12) 1px,
                    transparent 1px,
                    transparent 22px),
                linear-gradient(180deg, #ffffff, #fff8fc);

            border: 1px solid rgba(255, 120, 182, .18);
            border-radius: 18px;
            box-shadow: 0 22px 60px rgba(0, 0, 0, .35);

            transform: translateY(150px);
            opacity: 0;
            transition: .85s cubic-bezier(.2, .9, .2, 1);
            z-index: 2;
            padding: 18px 18px 18px 26px;
            color: #1f1f2a;
            overflow: hidden;
        }

        .paper::before {
            content: "";
            position: absolute;
            left: 14px;
            top: 14px;
            bottom: 14px;
            width: 2px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255, 120, 182, .55), rgba(255, 120, 182, .15));
            opacity: .9;
        }

        .paper::after {
            content: "";
            position: absolute;
            right: 0;
            top: 0;
            width: 64px;
            height: 64px;
            background:
                linear-gradient(135deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0) 49%,
                    rgba(255, 235, 245, .95) 50%,
                    rgba(255, 255, 255, .92) 100%);
            clip-path: polygon(100% 0, 0 0, 100% 100%);
            box-shadow: -8px 10px 20px rgba(0, 0, 0, .10);
            opacity: .95;
        }

        .paper h3 {
            margin: 0 0 10px;
            font-size: 16px;
            color: #1a1a22
        }

        .paper p {
            margin: 0;
            font-size: 13px;
            line-height: 1.55;
            color: #2f2f3b
        }

        .paper .paperHint {
            margin-top: 12px;
            font-size: 12px;
            color: rgba(60, 60, 80, .7);
        }

        .meta {
            position: absolute;
            inset: 0;
            z-index: 4;
            pointer-events: none;
        }

        .metaLeft {
            position: absolute;
            left: 88px;
            top: 56%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            opacity: .96;
        }

        .metaRight {
            position: absolute;
            right: 88px;
            bottom: 78px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            opacity: .86;
            max-width: min(320px, 42vw);
        }

        .metaLabel {
            font-size: 16px;
            color: var(--envTextMuted);
            letter-spacing: .2px;
            white-space: nowrap;
        }

        .sig {
            font-family: ui-rounded, "Segoe Script", "Bradley Hand", cursive;
            font-size: 28px;
            color: rgba(255, 120, 182, .92);
            text-shadow: 0 0 22px rgba(255, 120, 182, .25);
            transform: translateY(2px);
            white-space: nowrap;
        }

        .sig.smallSig {
            font-size: 18px;
            opacity: .88;
            white-space: normal;
            line-height: 1.15;
        }

        .line {
            height: 1px;
            width: 220px;
            background: linear-gradient(90deg, rgba(255, 120, 182, .32), rgba(255, 120, 182, .02));
            border-radius: 999px;
            margin-left: 8px;
            opacity: .65;
        }

        .hint {
            position: absolute;
            left: 88px;
            bottom: 44px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--envText);
            z-index: 6;
            pointer-events: none;
        }

        .chev {
            width: 22px;
            height: 22px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .18);
            background: rgba(255, 255, 255, .06);
            box-shadow: 0 0 18px rgba(255, 120, 182, .12);
        }

        .spotifyBtn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            margin-top: 6px;

            border-radius: 999px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;

            color: #fff;
            background: linear-gradient(135deg, #ff78b6, #ff5ca8);
            box-shadow:
                0 6px 18px rgba(255, 120, 182, .35),
                0 0 12px rgba(255, 120, 182, .25);

            transition: all .25s ease;
        }

        .spotifyBtn:hover {
            transform: translateY(-2px);
            box-shadow:
                0 10px 26px rgba(255, 120, 182, .45),
                0 0 18px rgba(255, 120, 182, .35);
        }

        .spotifyBtn:active {
            transform: scale(.98);
        }

        @media (max-width:520px) {
            .metaLeft {
                left: 22px
            }

            .metaRight {
                right: 22px;
                bottom: 68px;
                max-width: 55vw;
            }

            .hint {
                left: 22px
            }

            .line {
                width: 160px
            }

            .sig {
                font-size: 24px
            }

            .sig.smallSig {
                font-size: 14px
            }
        }

        .envWrap.open .flap {
            transform: rotateX(170deg)
        }

        .envWrap.open .seal {
            opacity: .25;
            transform: translate(-50%, -50%) scale(.92)
        }

        .envWrap.open .paper {
            transform: translateY(-20px);
            opacity: 1
        }

        /* ajuste para esconder os nomes quando abre */
        .paper {
            z-index: 6;
        }

        .meta {
            transition: opacity .6s ease, filter .6s ease;
        }

        .envWrap.open .meta {
            opacity: .12;
            filter: blur(6px);
        }

        .envWrap.open .hint {
            opacity: 0;
            transition: opacity .35s ease;
        }

        .envWrap.open .hintText::after {
            content: " (toque de novo)"
        }

        .stage.hidden {
            opacity: 0;
            visibility: hidden;
            transition: .6s
        }

        /* ================= APP ================= */

        .wrap {
            max-width: 520px;
            margin: 0 auto;
            padding: 20px 16px 30px;
            display: none;
        }

        .wrap.show {
            display: block
        }

        header {
            margin-bottom: 15px;
            position: relative;
            padding-right: 150px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            text-shadow: 0 6px 26px rgba(255, 120, 182, .12);
        }

        .sub {
            margin: 6px 0 0;
            font-size: 13px;
            color: var(--muted);
        }

        .pill {
            margin-top: 8px;
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 120, 182, .12);
            border: 1px solid rgba(255, 120, 182, .2);
            font-size: 13px;
            color: #555;
        }

        .saveBtn {
            position: absolute;
            top: 0;
            right: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 120, 182, .28);
            background: rgba(255, 255, 255, .65);
            color: #333;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 10px 28px rgba(255, 120, 182, .12);
        }

        .saveBtn:active {
            transform: translateY(1px)
        }

        .saveBtn .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 120, 182, .75);
            box-shadow: 0 0 12px rgba(255, 120, 182, .35);
        }

        /* POST ITS */
        .board {
            display: grid;
            gap: 14px;
            grid-template-columns: 1fr;
        }

        @media(min-width:520px) {
            .board {
                grid-template-columns: 1fr 1fr;
            }
        }

        .note {
            padding: 14px;
            border-radius: 16px;
            box-shadow: 0 14px 35px rgba(0, 0, 0, .18);
            transform: rotate(var(--rot));
            position: relative;
            cursor: pointer;

            filter: none;
            transition:
                filter 700ms cubic-bezier(.2, .9, .2, 1),
                transform 240ms ease;
        }

        .note:active {
            transform: rotate(var(--rot)) scale(.99)
        }

        .note h2 {
            margin: 0 0 6px;
            font-size: 15px
        }

        .note p {
            margin: 0;
            font-size: 14px;
            line-height: 1.5
        }

        .noteHead {
            display: flex;
            justify-content: flex-end;
            /* emoji fica no canto */
            margin-bottom: 8px;
            font-size: 12px;
            opacity: .9;
        }

        .note.locked {
            filter: blur(14px) saturate(.90) brightness(1.02);
            transform: rotate(var(--rot)) scale(.985);
        }

        .note.locked::after {
            content: "toque pra revelar 🤍";
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-size: 14px;
            color: rgba(20, 20, 30, .52);
            text-shadow: 0 1px 0 rgba(255, 255, 255, .75);
            pointer-events: none;
            filter: none !important;
        }

        .note.revealed {
            filter: none;
            animation: revealPop 260ms ease-out;
        }

        @keyframes revealPop {
            from {
                transform: rotate(var(--rot)) scale(.985)
            }

            to {
                transform: rotate(var(--rot)) scale(1)
            }
        }

        /* ====== PARTICULAS (bem discretas) ====== */
        .sparkleLayer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
        }

        .spark {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 30%,
                    rgba(255, 255, 255, .95),
                    rgba(255, 120, 182, .75) 45%,
                    rgba(255, 120, 182, 0) 72%);
            filter: blur(.2px);
            opacity: 0;
            transform: translate(-50%, -50%) scale(.6);
            animation: spark 520ms ease-out forwards;
            mix-blend-mode: screen;
        }

        .spark.star {
            width: 12px;
            height: 12px;
            border-radius: 0;
            background: radial-gradient(circle,
                    rgba(255, 255, 255, .95),
                    rgba(255, 120, 182, .65) 55%,
                    rgba(255, 120, 182, 0) 78%);
            clip-path: polygon(50% 0%,
                    62% 36%,
                    100% 50%,
                    62% 64%,
                    50% 100%,
                    38% 64%,
                    0% 50%,
                    38% 36%);
            filter: blur(.1px);
        }

        @keyframes spark {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(.55)
            }

            15% {
                opacity: .95
            }

            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.95)
            }
        }

        footer {
            margin-top: 25px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }

        @media (prefers-reduced-motion: reduce) {

            .flap,
            .seal,
            .paper,
            .stage.hidden {
                transition: none !important;
            }

            .note {
                transform: none !important;
                transition: none !important;
            }

            .note.revealed {
                animation: none !important;
            }

            .spark {
                animation: none !important;
                display: none !important;
            }

        }
    </style>
</head>

<body>

    <section class="stage" id="stage">
        <div class="envWrap" id="envWrap" role="button" tabindex="0" aria-label="Abrir carta para Gabriela">
            <div class="paper">
                <h3>pra você 🤍</h3>
                <p>
                    eu fiz isso aqui pra você abrir no celular e lembrar
                    que tem alguém sempre do seu lado.<br />
                    pega um post-it sempre que precisar.
                </p>
                <div class="paperHint">toque de novo pra ver os post-its ✨</div>
            </div>

            <div class="env">
                <div class="neonHalo"></div>
                <div class="neonBorder"></div>

                <div class="flap"></div>
                <div class="seal">🤍</div>

                <div class="meta">
                    <div class="metaLeft">
                        <div class="metaLabel">Para:</div>
                        <div class="sig">Gabriela</div>
                        <div class="line"></div>
                    </div>

                    <div class="metaRight">
                        <div class="metaLabel">De:</div>
                        <div class="sig smallSig">Felippe</div>
                    </div>

                    <div class="hint">
                        <div class="chev">⌃</div>
                        <div class="hintText">toque para abrir</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="wrap" id="app">
        <header>
            <h1 id="headline"></h1>

            <button class="saveBtn" id="backBtn" type="button" aria-label="Guardar post-its e voltar para o envelope">
                <span class="dot"></span>
                guardar post-its
            </button>

            <div class="sub">post-its do dia 🤍</div>
            <div class="pill" id="date"></div>
        </header>

        <main class="board" id="board"></main>

        <footer>feito com carinho</footer>
    </div>

    <!-- camada das partículas -->
    <div class="sparkleLayer" id="sparkleLayer"></div>

    <script>
        const stage = document.getElementById("stage");
        const envWrap = document.getElementById("envWrap");
        const app = document.getElementById("app");
        const board = document.getElementById("board");
        const backBtn = document.getElementById("backBtn");
        const sparkleLayer = document.getElementById("sparkleLayer");

        let openedOnce = false;

        function goToPosts() {
            stage.classList.add("hidden");
            app.classList.add("show");
        }

        function goToEnvelope() {
            // volta pra tela do envelope
            app.classList.remove("show");
            stage.classList.remove("hidden");
            envWrap.classList.remove("open");
            openedOnce = false;

            // ✅ RESETA os post-its (volta o blur)
            document.querySelectorAll(".note").forEach((el) => {
                el.classList.remove("revealed");
                el.classList.add("locked");
            });

            // (opcional) limpa partículas que sobraram
            sparkleLayer.innerHTML = "";

            window.scrollTo({ top: 0, behavior: "instant" });
        }

        function handleOpen() {
            if (!openedOnce) {
                envWrap.classList.add("open");
                openedOnce = true;
                return;
            }
            goToPosts();
        }

        envWrap.addEventListener("click", handleOpen);
        envWrap.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                handleOpen();
            }
        });

        backBtn.addEventListener("click", goToEnvelope);

        /* ========= particulas ========= */
        function spawnSparkles(x, y) {
            // cria 7-10 partículas discretas
            const count = 7 + Math.floor(Math.random() * 4);
            for (let i = 0; i < count; i++) {
                const s = document.createElement("div");
                s.className = "spark" + (Math.random() < 0.35 ? " star" : "");
                s.style.left = x + "px";
                s.style.top = y + "px";

                // espalhamento pequeno (discreto)
                const dx = (Math.random() * 40 - 20).toFixed(1) + "px";
                const dy = (Math.random() * 52 - 34).toFixed(1) + "px";
                s.style.setProperty("--dx", dx);
                s.style.setProperty("--dy", dy);

                // tamanhos levemente variados
                const size = 8 + Math.random() * 8;
                s.style.width = size + "px";
                s.style.height = size + "px";

                sparkleLayer.appendChild(s);
                s.addEventListener("animationend", () => s.remove());
            }
        }

        const notes = [
            {
                emo: "📌", title: "um bom dia bem feliz",
                text: "que hoje você se sinta leve e protegida."
            },
            {
                emo: "📌", title: "amo vcoe",
                text: "você é sensível de um jeito bonito. e eu amo como seu coração sente as coisas de verdade."
            },
            {
                emo: "📌", title: "meu lugar favorito",
                text: "é quando você encosta em mim e o mundo fica menor."
            },
            {
                emo: "📌", title: "um cantinho seguro",
                text: "quando o mundo ficar barulhento demais, lembra que tem um lugar calmo aqui comigo."
            },
            {
                emo: "📌", title: "coisa sua que eu amo",
                text: "o jeito que você sente tudo com profundidade. nunca deixa isso virar peso."
            },
            {
                emo: "📌",
                title: "música do dia",
                text: `
                separei uma musica bem genérica pra você.
                <br><br>
                <a 
                href="https://open.spotify.com/track/6lFUdRItQEsEuD7dSINL47" 
                target="_blank"
                class="spotifyBtn">
                🎵 ouvir no spotify
                </a>
                `
            },


        ];

        const colors = ["var(--noteA)", "var(--noteB)", "var(--noteC)", "var(--noteD)"];

        notes.forEach((n, i) => {
            const el = document.createElement("div");
            el.className = "note locked";
            el.style.setProperty("--rot", (Math.random() * 4 - 2) + "deg");
            el.style.background = colors[i % colors.length];
            el.innerHTML = `
  <div class="noteHead">
    <span>${n.emo}</span>
  </div>
  <h2>${n.title}</h2>
  <p>${n.text}</p>
`;

            el.addEventListener("click", (ev) => {
                if (el.classList.contains("revealed")) return;

                // solta partículas no centro do post-it
                const r = el.getBoundingClientRect();
                const x = r.left + r.width / 2;
                const y = r.top + r.height / 2;

                spawnSparkles(x, y);

                // revela
                el.classList.remove("locked");
                el.classList.add("revealed");
            });

            board.appendChild(el);
        });

        const now = new Date();
        document.getElementById("date").textContent =
            now.toLocaleDateString("pt-BR", { weekday: "long", day: "2-digit", month: "long" });

        const h = now.getHours();
        const saudacao = h < 12 ? "bom dia, " : h < 18 ? "boa tarde, " : "boa noite, ";
        document.getElementById("headline").textContent = saudacao + "gabriela 🤍";
    </script>

</body>

</html>
